spring:
  application:
    name: TaskEngine

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskengine}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:database}

    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
            scope:
              - openid
              - profile
              - email

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:myUltraSecureSecretKeyForJwt1234567890XYZ}
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000

  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173}

  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs