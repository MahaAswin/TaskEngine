spring:
  application:
    name: TaskEngine
  datasource:
    url: jdbc:postgresql://localhost:5432/taskengine
    username: postgres
    password: database
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Existing DBs created without Flyway (tables present, no flyway_schema_history)
    baseline-on-migrate: true
    baseline-version: 1
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-with-google-oauth-client-id.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-with-google-oauth-client-secret}
            scope:
              - openid
              - profile
              - email

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:abcdefghijklmnopqrstuvwxyz0123456789abcdefg}
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:5173,https://app.taskengine.example}
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/taskengine
    username: postgres
    password: postgres
