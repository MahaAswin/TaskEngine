spring.datasource.url=jdbc:h2:mem:taskenginetest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false

app.jwt.secret=test-secret-key-with-minimum-32-characters-long
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

app.cors.allowed-origins=http://localhost:3000

spring.security.oauth2.client.registration.google.client-id=test-client-id.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=test-secret
